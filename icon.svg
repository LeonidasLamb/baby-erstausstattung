<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF5EA"/>
      <stop offset="1" stop-color="#F2E6D2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4B26A"/>
      <stop offset="0.5" stop-color="#B8924A"/>
      <stop offset="1" stop-color="#8A6A2E"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="14" y="14" width="484" height="484" rx="102" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.55"/>

  <g transform="translate(256,262)">
    <!-- pram body: half-circle bassinet -->
    <path d="M -116 -8 A 116 116 0 0 1 116 -8 Z" fill="url(#gold)"/>
    <!-- canopy line detail -->
    <path d="M -64 -64 A 64 64 0 0 1 64 -64" fill="none" stroke="#FBF5EA" stroke-width="6" opacity="0.45" stroke-linecap="round"/>
    <path d="M 0 -116 L 0 -8" stroke="#FBF5EA" stroke-width="6" opacity="0.45"/>
    <!-- handle -->
    <path d="M 116 -8 Q 188 -8 188 -150" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <!-- chassis -->
    <path d="M -116 -8 L -86 70 M 116 -8 L 86 70 M -116 -8 L 116 -8" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- wheels -->
    <circle cx="-86" cy="96" r="30" fill="none" stroke="url(#gold)" stroke-width="14"/>
    <circle cx="-86" cy="96" r="5" fill="url(#gold)"/>
    <circle cx="86" cy="96" r="30" fill="none" stroke="url(#gold)" stroke-width="14"/>
    <circle cx="86" cy="96" r="5" fill="url(#gold)"/>
  </g>
</svg>
